<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="VTT" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>%WEB_TITLE%</title>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }

      body {
        overflow: hidden;
      }

      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <div id="root"></div>
    <script>
      (function () {
        var isExpoDevServer = window.location.hostname === 'localhost' && window.location.port === '8081';
        var refreshing = false;

        function notifyUpdateReady() {
          if (typeof CustomEvent === 'function') {
            window.dispatchEvent(new CustomEvent('vtt:pwa-update-ready'));
            return;
          }
          var event = document.createEvent('CustomEvent');
          event.initCustomEvent('vtt:pwa-update-ready', false, false, undefined);
          window.dispatchEvent(event);
        }

        if ('serviceWorker' in navigator && !isExpoDevServer) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('/service-worker.js').then(function (registration) {
              if (registration.waiting && navigator.serviceWorker.controller) {
                notifyUpdateReady();
              }

              registration.addEventListener('updatefound', function () {
                var worker = registration.installing;
                if (!worker) return;
                worker.addEventListener('statechange', function () {
                  if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                    notifyUpdateReady();
                  }
                });
              });

              window.addEventListener('vtt:pwa-apply-update', function () {
                if (registration.waiting) {
                  registration.waiting.postMessage({ type: 'SKIP_WAITING' });
                }
              });

              registration.update().catch(function () {});
            }).catch(function () {});

            navigator.serviceWorker.addEventListener('controllerchange', function () {
              if (refreshing) return;
              refreshing = true;
              window.location.reload();
            });
          });
        }
      })();
    </script>
  </body>
</html>
