services:
  api:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: task-manager-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8787
      DATA_FILE: /data/store.json
      DEV_AUTH_CODE: "${DEV_AUTH_CODE:-1234}"
    ports:
      - "${API_PORT:-8787}:8787"
    volumes:
      - api-data:/data

  caddy:
    image: caddy:2.8-alpine
    container_name: task-manager-caddy
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/task-manager/web:/srv/web:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  api-data:
  caddy-data:
  caddy-config:
