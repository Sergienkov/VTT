services:
  api:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: task-manager-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8787
      DATA_FILE: /data/store.json
    ports:
      - "${API_PORT:-8787}:8787"
    volumes:
      - api-data:/data

volumes:
  api-data:
