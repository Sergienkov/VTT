name: Deploy Server

on:
  workflow_dispatch:

concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Web and API
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production PWA
        run: npm run web:export:prod

      - name: Pack production PWA
        run: tar -czf web-dist.tar.gz -C dist .

      - name: Upload production PWA
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: web-dist.tar.gz
          target: /tmp/task-manager-deploy

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            APP_DIR="${{ secrets.SERVER_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="/opt/task-manager"; fi

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -d ".git" ]; then
              git clone "https://github.com/${{ github.repository }}.git" .
            fi

            git fetch origin main
            git reset --hard origin/main

            mkdir -p "$APP_DIR/web"
            tar -xzf /tmp/task-manager-deploy/web-dist.tar.gz -C "$APP_DIR/web"

            docker compose -f deploy/docker-compose.yml up -d --build
            docker compose -f deploy/docker-compose.yml ps

            for i in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:8787/health; then
                exit 0
              fi
              sleep 2
            done

            docker logs --tail 120 task-manager-api || true
            exit 1
